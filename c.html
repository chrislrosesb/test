<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A curated reading list from Chris Rose</title>

  <!-- Open Graph — static fallback (no server-side PHP) -->
  <meta property="og:type"         content="website"/>
  <meta property="og:site_name"    content="Chris Rose"/>
  <meta property="og:title"        content="A curated reading list from Chris Rose"/>
  <meta property="og:description"  content="Articles handpicked from Chris Rose's reading list"/>
  <meta property="og:image"        content="https://chrislrose.aseva.ai/og-reading-list.png"/>
  <meta property="og:image:width"  content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:type"   content="image/png"/>

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image"/>
  <meta name="twitter:title"       content="A curated reading list from Chris Rose"/>
  <meta name="twitter:description" content="Articles handpicked from Chris Rose's reading list"/>
  <meta name="twitter:image"       content="https://chrislrose.aseva.ai/og-reading-list.png"/>

  <meta name="description" content="Articles handpicked from Chris Rose's reading list"/>

  <script>
    // Redirect to reading list with collection ID preserved
    var id = new URLSearchParams(window.location.search).get('id');
    window.location.replace('reading-list.html' + (id ? '?collection=' + encodeURIComponent(id) : ''));
  </script>

  <style>
    body { margin:0; background:#07070f; color:#fff;
           font-family:-apple-system,sans-serif; display:flex;
           align-items:center; justify-content:center; height:100vh; }
    p { color:#818cf8; font-size:18px; }
  </style>
</head>
<body>
  <p>Opening reading list…</p>
</body>
</html>
