<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070f"/>
      <stop offset="100%" stop-color="#0f0f20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Card gradients -->
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2e2b6e"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14143a"/>
      <stop offset="100%" stop-color="#252358"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow -->
  <ellipse cx="900" cy="300" rx="350" ry="280" fill="#4f46e5" fill-opacity="0.06"/>

  <!-- Stacked article cards (right side, decorative) -->
  <!-- Card 3 (back) -->
  <rect x="680" y="145" width="360" height="200" rx="16" fill="url(#card3)"
        transform="rotate(-8 860 245)" opacity="0.7"/>
  <!-- Card 2 (middle) -->
  <rect x="680" y="155" width="360" height="200" rx="16" fill="url(#card2)"
        transform="rotate(-3 860 255)" opacity="0.85"/>
  <!-- Card 1 (front) -->
  <rect x="680" y="165" width="360" height="200" rx="16" fill="url(#card1)"/>
  <!-- Card 1 content lines -->
  <rect x="704" y="193" width="200" height="10" rx="5" fill="#818cf8" fill-opacity="0.5"/>
  <rect x="704" y="213" width="280" height="8" rx="4" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="704" y="229" width="240" height="8" rx="4" fill="#ffffff" fill-opacity="0.1"/>
  <rect x="704" y="245" width="180" height="8" rx="4" fill="#ffffff" fill-opacity="0.08"/>
  <!-- Card 1 tag pill -->
  <rect x="704" y="320" width="64" height="22" rx="11" fill="#4f46e5" fill-opacity="0.5"/>
  <rect x="778" y="320" width="50" height="22" rx="11" fill="#4f46e5" fill-opacity="0.3"/>

  <!-- Stars on front card -->
  <text x="900" y="342" font-family="sans-serif" font-size="16" fill="#fbbf24" text-anchor="middle">★★★★★</text>

  <!-- Left accent bar -->
  <rect x="80" y="185" width="4" height="260" fill="url(#accent)" rx="2"/>

  <!-- Label -->
  <text x="116" y="240"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
        font-size="18" font-weight="600" fill="#818cf8" letter-spacing="3">CHRIS ROSE</text>

  <!-- Title -->
  <text x="114" y="310"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
        font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">Reading</text>
  <text x="114" y="385"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
        font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">List</text>

  <!-- Divider -->
  <rect x="116" y="408" width="420" height="1" fill="#4f46e5" fill-opacity="0.5" rx="1"/>

  <!-- Description -->
  <text x="116" y="440"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
        font-size="20" font-weight="400" fill="#ffffff" fill-opacity="0.45">Tech · Leadership · Cybersecurity · and more</text>

  <!-- Domain badge -->
  <rect x="116" y="460" width="282" height="34" rx="17" fill="#4f46e5" fill-opacity="0.18"/>
  <text x="257" y="482"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
        font-size="16" font-weight="500" fill="#818cf8" text-anchor="middle">chrislrose.aseva.ai/reading-list</text>
</svg>
